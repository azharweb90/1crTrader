<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1CrTrader</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 34 34'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%232e75b6'/%3E%3Cstop offset='100%25' stop-color='%231d9e75'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='34' height='34' rx='9' fill='url(%23g)'/%3E%3Ctext x='17' y='21' font-family='Arial, Helvetica, sans-serif' font-weight='800' font-size='13' fill='%23ffffff' text-anchor='middle' letter-spacing='-0.3'%3E1Cr%3C/text%3E%3Crect x='9.5' y='24' width='15' height='2' rx='1' fill='%23ffffff' opacity='0.85'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/app/dashboard.css">
</head>
<body>

<div id="app-shell" class="app-shell">

  <!-- Persistent left sidebar (hidden until profile setup is complete) -->
  <nav id="sidebar" class="sidebar hidden">
    <button type="button" class="sidebar-brand" onclick="switchTab(event, 'tab-dashboard')" aria-label="Go to Dashboard">
      <svg class="sidebar-brand-mark" width="34" height="34" viewBox="0 0 34 34" role="img" aria-label="1CrTrader logo">
        <defs>
          <linearGradient id="brandMarkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2e75b6"/>
            <stop offset="100%" stop-color="#1d9e75"/>
          </linearGradient>
        </defs>
        <rect width="34" height="34" rx="9" fill="url(#brandMarkGradient)"/>
        <text x="17" y="21" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="13" fill="#ffffff" text-anchor="middle" letter-spacing="-0.3">1Cr</text>
        <rect x="9.5" y="24" width="15" height="2" rx="1" fill="#ffffff" opacity="0.85"/>
      </svg>
      <div class="sidebar-brand-text">
        <div class="sidebar-brand-title">1CrTrader</div>
        <div class="sidebar-brand-subtitle">Risk Discipline</div>
      </div>
    </button>

    <div class="sidebar-nav-group">
      <button class="sidebar-link" data-tab="tab-dashboard" onclick="switchTab(event, 'tab-dashboard')">
        <span class="sidebar-link-icon">⌂</span><span>Dashboard</span>
      </button>
      <button class="sidebar-link" data-tab="tab-calculator" onclick="switchTab(event, 'tab-calculator')">
        <span class="sidebar-link-icon">⏱</span><span>Daily Limits Tool</span>
      </button>
      <button class="sidebar-link" data-tab="tab-roadmap" onclick="switchTab(event, 'tab-roadmap')">
        <span class="sidebar-link-icon">↗</span><span>Roadmap</span>
      </button>
      <button class="sidebar-link" data-tab="tab-journal" onclick="switchTab(event, 'tab-journal')">
        <span class="sidebar-link-icon">✎</span><span>Trading Journal</span>
      </button>
      <button class="sidebar-link" data-tab="tab-education" onclick="switchTab(event, 'tab-education')">
        <span class="sidebar-link-icon">▶</span><span>Education</span>
      </button>
      <button class="sidebar-link" data-tab="tab-books" onclick="switchTab(event, 'tab-books')">
        <span class="sidebar-link-icon">▤</span><span>Books</span>
      </button>
      <button class="sidebar-link" data-tab="tab-strategies" onclick="switchTab(event, 'tab-strategies')">
        <span class="sidebar-link-icon">🧩</span><span>Strategies</span>
      </button>
    </div>

    <div class="sidebar-nav-group sidebar-nav-group-bottom">
      <button class="sidebar-link" data-tab="tab-settings" onclick="switchTab(event, 'tab-settings')">
        <span class="sidebar-link-icon">⚙</span><span>Account</span>
      </button>
      <button class="sidebar-link" data-tab="tab-subs" onclick="switchTab(event, 'tab-subs')">
        <span class="sidebar-link-icon">★</span><span>Subscription Pricing</span>
      </button>
    </div>
  </nav>

  <!-- Main column: top bar + content -->
  <div class="main-column">
    <header id="top-bar" class="top-bar hidden">
      <div class="top-bar-title">
        <h1 id="top-bar-page-title" class="top-bar-page-title">Dashboard</h1>
      </div>
      <div class="top-bar-right">
        <div id="header-balance-pill" class="header-balance-pill" style="display:none;">
          <span class="header-balance-label">Balance</span>
          <span id="header-balance-value" class="header-balance-value">&mdash;</span>
        </div>
        <div id="header-avatar-wrap" class="header-avatar-wrap" style="display:none;">
          <button type="button"
                  id="header-avatar-btn"
                  class="header-avatar-btn"
                  aria-haspopup="true"
                  aria-expanded="false"
                  onclick="toggleAccountMenu(event)">
            <span id="header-avatar-initials" class="header-avatar-initials"></span>
          </button>
          <div id="header-account-menu" class="header-account-menu hidden" role="menu">
            <div class="header-account-menu-identity">
              <div id="header-account-menu-name" class="header-account-menu-name"></div>
              <div id="header-account-menu-email" class="header-account-menu-email"></div>
            </div>
            <div id="header-account-menu-tier" class="header-account-menu-tier"></div>
            <button type="button" class="header-account-menu-item" onclick="switchTab(event, 'tab-settings')">
              View Account
            </button>
            <button type="button" class="header-account-menu-item header-account-menu-item-danger" onclick="handleLogout()">
              Log Out
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="content-area">
      <!-- Each tab-content is an empty slot; dashboard.js fetches the matching
           components/*.html fragment into it the first time the tab is opened. -->
      <div id="tab-select" class="tab-content active"></div>
      <div id="tab-dashboard" class="tab-content"></div>
      <div id="tab-calculator" class="tab-content"></div>
      <div id="tab-roadmap" class="tab-content"></div>
      <div id="tab-journal" class="tab-content"></div>
      <div id="tab-education" class="tab-content"></div>
      <div id="tab-books" class="tab-content"></div>
      <div id="tab-strategies" class="tab-content"></div>
      <div id="tab-settings" class="tab-content"></div>
      <div id="tab-subs" class="tab-content"></div>
    </main>
  </div>

</div>

<script src="/website/auth.js"></script>
<script src="/app/dashboard.js"></script>
</body>
</html>
