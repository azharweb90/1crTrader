<!-- COMPONENT: learn (Knowledge Area) -->
<section class="content-section">
  <p class="section-note" style="margin:0 0 20px; max-width:720px;">Everything to sharpen your edge in one place — watch a lesson, pick up a book, or brush up on the discipline habits that protect your capital.</p>

  <div class="learn-tab-bar">
    <button type="button" class="learn-tab-btn" data-learn-tab="videos" onclick="setLearnTab('videos')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg>
      Videos <span class="learn-tab-count" id="learn-video-count">0</span>
    </button>
    <button type="button" class="learn-tab-btn" data-learn-tab="books" onclick="setLearnTab('books')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h12v16H6a2 2 0 0 0-2 2z"/><path d="M4 19a2 2 0 0 0 2 2h12"/></svg>
      Books <span class="learn-tab-count" id="learn-book-count">0</span>
    </button>
    <button type="button" class="learn-tab-btn" data-learn-tab="suggestions" onclick="setLearnTab('suggestions')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></svg>
      Suggestions <span class="learn-tab-count" id="learn-sug-count">0</span>
    </button>
  </div>

  <div id="learn-chip-row" class="learn-chip-row"></div>

  <div id="learn-content-area"></div>
</section>

<!-- Detail drawer — reused for Suggestions (same pattern as the old
     standalone Suggestions tab: side panel, not a centered modal). -->
<div id="suggestions-panel-overlay" class="suggestions-panel-overlay hidden" onclick="closeSuggestionPanel(event)">
  <div id="suggestions-panel" class="suggestions-panel" onclick="event.stopPropagation()">
    <div class="suggestions-panel-header">
      <span id="suggestions-panel-category" class="suggestions-panel-category">&mdash;</span>
      <button type="button" class="suggestions-panel-close" onclick="closeSuggestionPanel()"
        aria-label="Close">&times;</button>
    </div>
    <div class="suggestions-panel-body">
      <h3 id="suggestions-panel-title" class="suggestions-panel-title">&mdash;</h3>
      <p id="suggestions-panel-text" class="suggestions-panel-text"></p>
    </div>
  </div>
</div>

<!-- Large cinematic video player modal — matches the Claude Design
     reference exactly: 16:9 gradient poster stage with big play button,
     category chip, close button, and a dark transport bar (play/pause,
     timeline, time counter, volume/fullscreen). Below: title + Save,
     meta row, description, and an "Up Next" row. Posters/timings are
     placeholders — swap the gradient stage for a real <video>/embed and
     wire actual duration/progress when real video files exist. -->
<div id="video-player-overlay" class="video-player-overlay hidden" onclick="closeVideoPlayerIfOutside(event)">
  <div class="video-player-modal" onclick="event.stopPropagation()">
    <div class="video-player-stage" id="video-player-stage">
      <span id="video-player-chip" class="video-player-chip"><span class="video-player-chip-dot"></span></span>
      <button type="button" class="video-player-close" onclick="closeVideoPlayer()" aria-label="Close">&times;</button>
      <button type="button" class="video-player-playbtn" id="video-player-playbtn" onclick="toggleVideoPlayback()" aria-label="Play">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="#1C2A3F"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>

    <div class="video-player-transport">
      <button type="button" class="video-transport-btn" onclick="toggleVideoPlayback()" aria-label="Play/Pause">
        <svg id="video-transport-play-icon" width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="video-transport-track" id="video-transport-track" onclick="seekVideo(event)">
        <div class="video-transport-fill" id="video-transport-fill"></div>
      </div>
      <span class="video-transport-time" id="video-transport-time">0:00 / 0:00</span>
      <button type="button" class="video-transport-icon-btn" aria-label="Volume">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
      </button>
      <button type="button" class="video-transport-icon-btn" aria-label="Fullscreen">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M8 21H5a2 2 0 0 1-2-2v-3"/></svg>
      </button>
    </div>

    <div class="video-player-body">
      <div class="video-player-title-row">
        <h3 id="video-player-title" class="video-player-title">&mdash;</h3>
        <button type="button" class="video-player-save-btn" id="video-player-save-btn" onclick="toggleSaveVideo()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12v18l-6-4-6 4z"/></svg>
          Save
        </button>
      </div>
      <div id="video-player-meta" class="video-player-meta"></div>
      <p id="video-player-desc" class="video-player-desc"></p>

      <div class="video-player-upnext">
        <div class="video-player-upnext-label">Up Next</div>
        <div id="video-player-upnext-list"></div>
      </div>
    </div>
  </div>
</div>
<!-- END COMPONENT: learn -->
