<!-- COMPONENT: dashboard-home -->
<div class="dash-home-wrap">
  <p class="section-note" style="margin-bottom:20px;">A quick look at where things stand, and shortcuts to where you'll
    spend most of your time.</p>

  <!-- Four stat boxes — each its own independent card -->
  <div id="dash-stat-grid" class="dash-stat-grid"></div>

  <!-- Risk rules at-a-glance — its own card, visually distinct -->
  <div id="dash-risk-wrap" class="dash-risk-wrap hidden">
    <div class="mini-ladder-title">Your Risk Rules Right Now</div>
    <div id="dash-risk-grid" class="dash-risk-grid"></div>
    <div id="dash-lot-progress-row" class="dash-lot-progress-row hidden">
      <div class="dash-lot-progress-track">
        <div id="dash-lot-progress-fill" class="dash-lot-progress-fill"></div>
      </div>
      <p id="dash-risk-lot-note" class="dash-lot-progress-note"></p>
    </div>
  </div>

  <!-- Jump back in — Daily Limits Tool, Roadmap, Trading Journal, Account -->
  <div class="dash-section-group">
    <div class="dash-stat-label">Jump back in</div>
    <div class="dash-section-card">
    <div class="dash-quicklink-grid">
      <button type="button" class="dash-quicklink-card" onclick="switchTab(null, 'tab-calculator')">
        <span class="dash-quicklink-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 13l3.5-2.5"/></svg></span>
        <div>
          <div class="dash-quicklink-title">Daily Limits Tool</div>
          <div class="dash-quicklink-desc">Log today's trades and stay inside your risk limits</div>
        </div>
      </button>
      <button type="button" class="dash-quicklink-card" onclick="switchTab(null, 'tab-roadmap')">
        <span class="dash-quicklink-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="19" r="2.4"/><circle cx="18" cy="5" r="2.4"/><path d="M8.4 19H14a3 3 0 0 0 3-3V8"/></svg></span>
        <div>
          <div class="dash-quicklink-title">Roadmap</div>
          <div class="dash-quicklink-desc">See your tier progress and goal projections</div>
        </div>
      </button>
      <button type="button" class="dash-quicklink-card" onclick="switchTab(null, 'tab-journal')">
        <span class="dash-quicklink-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg></span>
        <div>
          <div class="dash-quicklink-title">Trading Journal</div>
          <div class="dash-quicklink-desc">Write up strategy, emotion, and review past trades</div>
        </div>
      </button>
      <button type="button" class="dash-quicklink-card" onclick="switchTab(null, 'tab-settings')">
        <span class="dash-quicklink-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 7 19.4a1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0-1.2-2.9H1a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 2.6 7a1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.7 1.7 0 0 0 9 2.6h.1A2 2 0 1 1 13 2.6V2.7A1.7 1.7 0 0 0 16 4a1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0 1.2 2.9h.1a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.6 1.6z"/></svg></span>
        <div>
          <div class="dash-quicklink-title">Account</div>
          <div class="dash-quicklink-desc">Change tier, capital, trading style, or instruments</div>
        </div>
      </button>
    </div>
    </div>
  </div>

  <!-- Recent activity -->
  <div class="dash-section-group">
    <div class="dash-stat-label">Recent Activity</div>
    <div id="dash-recent-wrap" class="dash-recent-wrap dash-section-card">
      <div id="dash-recent-area"></div>
    </div>
  </div>
</div>
