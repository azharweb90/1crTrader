<!-- COMPONENT: dashboard-home -->
<div class="dash-home-wrap">
  <p class="section-note" style="margin-bottom:20px;">A quick look at where things stand, and shortcuts to where you'll
    spend most of your time.</p>

  <!-- Discipline Score + Streak — dashboard hero card. Scores rule-
       following (not P&L): a 0-100 score ring, a consecutive-clean-day
       streak, a 21-day heatmap, and 4 at-a-glance habit rows. Per the
       "Discipline Features" handoff (Feature 1). -->
  <div id="disc-score-card" class="disc-card"></div>

  <!-- Four stat boxes — each its own independent card -->
  <div id="dash-stat-grid" class="dash-stat-grid"></div>

  <!-- Risk rules at-a-glance — its own card, visually distinct -->
  <div id="dash-risk-wrap" class="dash-risk-wrap hidden">
    <div class="mini-ladder-title">Your Risk Rules Right Now</div>
    <div id="dash-risk-grid" class="dash-risk-grid"></div>
    <div id="dash-lot-progress-row" class="dash-lot-progress-row hidden">
      <div class="dash-lot-progress-track">
        <div id="dash-lot-progress-fill" class="dash-lot-progress-fill"></div>
      </div>
      <p id="dash-risk-lot-note" class="dash-lot-progress-note"></p>
    </div>
  </div>

  <!-- Risk Exposure — Max Drawdown (real trade history, same as every
       other card here) + Trading Hours (needs per-trade execution time,
       only available once a broker is connected — see the empty-state
       copy rendered by renderTradingHoursCard() in dashboard-home.js).
       NEW section, added alongside the drawdown limit rule introduced
       in onboarding. -->
  <div class="dash-section-group">
    <div class="dash-stat-label">Risk Exposure</div>
    <p class="section-note" style="margin:-2px 0 12px;">How much cushion you have left, and when you trade best.</p>
    <div class="dash-exposure-grid">
      <div id="dash-drawdown-card" class="dash-section-card dash-drawdown-card"></div>
      <div id="dash-hours-card" class="dash-section-card dash-hours-card"></div>
    </div>
  </div>

  <!-- Weekly / Monthly Disciplined Review — an auto-generated behavioural
       review (not a P&L report): spots patterns in the trader's real
       logged trades (win/loss, rule-adherence) rather than judging by
       P&L. Per the "Discipline Features" handoff (Feature 2). -->
  <div class="dash-section-group">
    <div class="dash-stat-label">This week's review</div>
    <div id="dash-review-card" class="wr-card dash-section-card"></div>
  </div>

  <!-- Jump back in — Daily Limits, Trade Manager, Trading Journal, Strategies (Account intentionally not shown here) -->
  <div class="dash-section-group">
    <div class="dash-stat-label">Jump back in</div>
    <div class="dash-section-card">
    <div class="dash-quicklink-grid">
      <button type="button" class="dash-quicklink-card" onclick="switchTab(null, 'tab-calculator')">
        <span class="dash-quicklink-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 13l3.5-2.5"/></svg></span>
        <div>
          <div class="dash-quicklink-title">Daily Limits Tool</div>
          <div class="dash-quicklink-desc">Log today's trades and stay inside your risk limits</div>
        </div>
      </button>
      <button type="button" class="dash-quicklink-card" onclick="switchTab(null, 'tab-trade-manager')">
        <span class="dash-quicklink-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17V9l-3 3M7 9l3 3M17 7v8l3-3M17 15l-3-3"/></svg></span>
        <div>
          <div class="dash-quicklink-title">Trade Manager</div>
          <div class="dash-quicklink-desc">Track a live trade against its entry, stop, and target</div>
        </div>
      </button>
      <button type="button" class="dash-quicklink-card" onclick="switchTab(null, 'tab-journal')">
        <span class="dash-quicklink-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg></span>
        <div>
          <div class="dash-quicklink-title">Trading Journal</div>
          <div class="dash-quicklink-desc">Write up strategy, emotion, and review past trades</div>
        </div>
      </button>
      <button type="button" class="dash-quicklink-card" onclick="switchTab(null, 'tab-strategies')">
        <span class="dash-quicklink-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M1 12h3M20 12h3"/></svg></span>
        <div>
          <div class="dash-quicklink-title">Strategies</div>
          <div class="dash-quicklink-desc">Build, refine and manage your trading strategies</div>
        </div>
      </button>
    </div>
    </div>
  </div>

  <!-- Recent activity — moved to the very bottom (previously sat above
       This week's review) so the primary top-to-bottom flow matches the
       reorganized reference: discipline -> stats -> risk rules -> risk
       exposure -> weekly review -> jump back in, with the raw activity
       log last since it's already summarized higher up. -->
  <div class="dash-section-group">
    <div class="dash-stat-label">Recent Activity</div>
    <div id="dash-recent-wrap" class="dash-recent-wrap dash-section-card">
      <div id="dash-recent-area"></div>
    </div>
  </div>
</div>
<!-- END COMPONENT: dashboard-home -->
