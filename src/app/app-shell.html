<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1CrTrader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/assets/images/logos/favicon.png">
  <link rel="stylesheet" href="/src/app/styles/tokens.css">
  <link rel="stylesheet" href="/src/app/styles/main.css">
  <link rel="stylesheet" href="/src/app/styles/themes/app-theme.css">
  <link rel="stylesheet" href="/src/app/product-tour/product-tour.css">
  <link rel="stylesheet" href="/src/app/onboarding/onboarding.css">
  <link rel="stylesheet" href="/src/app/cooldown-lock/cooldown-lock.css">
</head>
<body>

<div id="app-shell" class="app-shell">

  <!-- Persistent left sidebar (hidden until profile setup is complete) -->
  <nav id="sidebar" class="sidebar hidden">
    <button type="button" class="sidebar-brand" onclick="switchTab(event, 'tab-dashboard')" aria-label="Go to Dashboard">
      <img class="sidebar-brand-logo" src="/assets/images/logos/1crtraders-logo-horizontal.png" alt="1CrTraders — Reward Above Risk">
    </button>

    <div class="sidebar-menu-label">Menu</div>
    <div class="sidebar-nav-group">
      <button class="sidebar-link" data-tab="tab-dashboard" onclick="switchTab(event, 'tab-dashboard')">
        <span class="sidebar-link-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg></span><span>Dashboard</span>
      </button>
      <button class="sidebar-link" data-tab="tab-chart-prep" onclick="switchTab(event, 'tab-chart-prep')">
        <span class="sidebar-link-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg></span><span>Chart Prep</span>
      </button>
      <button class="sidebar-link" data-tab="tab-calculator" onclick="switchTab(event, 'tab-calculator')">
        <span class="sidebar-link-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 13l3.5-2.5M12 5v0"/></svg></span><span>Daily Limits Tool</span>
      </button>
      <button class="sidebar-link" data-tab="tab-trade-manager" onclick="switchTab(event, 'tab-trade-manager')">
        <span class="sidebar-link-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17V9l-3 3M7 9l3 3M17 7v8l3-3M17 15l-3-3"/></svg></span><span>Trade Manager</span>
      </button>
      <button class="sidebar-link" data-tab="tab-journal" onclick="switchTab(event, 'tab-journal')">
        <span class="sidebar-link-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg></span><span>Trading Journal</span>
      </button>
      <button class="sidebar-link" data-tab="tab-strategies" onclick="switchTab(event, 'tab-strategies')">
        <span class="sidebar-link-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M1 12h3M20 12h3"/></svg></span><span>Strategies</span>
      </button>
      <button class="sidebar-link" data-tab="tab-roadmap" onclick="switchTab(event, 'tab-roadmap')">
        <span class="sidebar-link-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21V4"/><path d="M5 4h13l-2.5 4L18 12H5"/></svg></span><span>Challenge</span>
      </button>
      <button class="sidebar-link" data-tab="tab-calculators" onclick="switchTab(event, 'tab-calculators')">
        <span class="sidebar-link-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2.5" width="14" height="19" rx="2"/><line x1="8" y1="6.5" x2="16" y2="6.5"/><circle cx="8.3" cy="11" r="0.9" fill="currentColor" stroke="none"/><circle cx="12" cy="11" r="0.9" fill="currentColor" stroke="none"/><circle cx="15.7" cy="11" r="0.9" fill="currentColor" stroke="none"/><circle cx="8.3" cy="14.5" r="0.9" fill="currentColor" stroke="none"/><circle cx="12" cy="14.5" r="0.9" fill="currentColor" stroke="none"/><circle cx="15.7" cy="14.5" r="0.9" fill="currentColor" stroke="none"/><circle cx="8.3" cy="18" r="0.9" fill="currentColor" stroke="none"/><circle cx="12" cy="18" r="0.9" fill="currentColor" stroke="none"/></svg></span><span>Calculators</span>
      </button>
      <button class="sidebar-link" data-tab="tab-learn" onclick="switchTab(event, 'tab-learn')">
        <span class="sidebar-link-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg></span><span>Knowledge Area</span>
      </button>
    </div>

    <div class="sidebar-nav-group sidebar-nav-group-bottom">
      <button class="sidebar-link" data-tab="tab-settings" onclick="switchTab(event, 'tab-settings')">
        <span class="sidebar-link-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.4"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></span><span>Account</span>
      </button>
    </div>
  </nav>

  <!-- Main column: top bar + content -->
  <div class="main-column">
    <header id="top-bar" class="top-bar hidden">
      <div class="top-bar-title">
        <h1 id="top-bar-page-title" class="top-bar-page-title">Dashboard</h1>
      </div>
      <div class="top-bar-right">
        <div class="font-size-control" title="Adjust text size">
          <button type="button" class="font-size-btn" onclick="adjustFontSize(-1)" aria-label="Decrease font size">A<span style="font-size:0.7em;vertical-align:super;">−</span></button>
          <span id="font-size-label" class="font-size-label">A</span>
          <button type="button" class="font-size-btn" onclick="adjustFontSize(1)" aria-label="Increase font size">A<span style="font-size:0.7em;vertical-align:super;">+</span></button>
        </div>
        <div id="header-balance-pill" class="header-balance-pill" style="display:none;">
          <span class="header-balance-label">Balance</span>
          <span id="header-balance-value" class="header-balance-value">&mdash;</span>
        </div>
        <div id="header-avatar-wrap" class="header-avatar-wrap" style="display:none;">
          <button type="button"
                  id="header-avatar-btn"
                  class="header-avatar-btn"
                  aria-haspopup="true"
                  aria-expanded="false"
                  onclick="toggleAccountMenu(event)">
            <span id="header-avatar-initials" class="header-avatar-initials"></span>
          </button>
          <div id="header-account-menu" class="header-account-menu hidden" role="menu">
            <div class="header-account-menu-identity">
              <div id="header-account-menu-name" class="header-account-menu-name"></div>
              <div id="header-account-menu-email" class="header-account-menu-email"></div>
            </div>
            <div id="header-account-menu-tier" class="header-account-menu-tier"></div>
            <button type="button" class="header-account-menu-item" onclick="switchTab(event, 'tab-settings')">
              View Account
            </button>
            <button type="button" class="header-account-menu-item header-account-menu-item-danger" onclick="handleLogout()">
              Log Out
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="content-area">
      <!-- Each tab-content is an empty slot; app-shell.js fetches the matching
           components/*.html fragment into it the first time the tab is opened. -->
      <div id="tab-select" class="tab-content active"></div>
      <div id="tab-dashboard" class="tab-content"></div>
      <div id="tab-chart-prep" class="tab-content"></div>
      <div id="tab-calculator" class="tab-content"></div>
      <div id="tab-trade-manager" class="tab-content"></div>
      <div id="tab-roadmap" class="tab-content"></div>
      <div id="tab-calculators" class="tab-content"></div>
      <div id="tab-journal" class="tab-content"></div>
      <div id="tab-learn" class="tab-content"></div>
      <div id="tab-strategies" class="tab-content"></div>
      <div id="tab-settings" class="tab-content"></div>
    </main>
  </div>

</div>

<script src="/src/app/shared/utils/formatters.js"></script>
<script src="/src/app/shared/risk-engine/tier-rules.js"></script>
<script src="/src/app/app-shell.js"></script>
<script src="/src/app/product-tour/product-tour.js"></script>
<script src="/src/app/product-tour/tour-content.js"></script>
<script src="/src/app/onboarding/onboarding.js"></script>
<script src="/src/app/cooldown-lock/cooldown-lock.js"></script>
</body>
</html>
